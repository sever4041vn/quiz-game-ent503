<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPG Quiz - Boss HP & Answer Reveal</title>
    <style>
        :root {
            --primary: #ff4757;
            --secondary: #2e86de;
            --success: #2ed573;
            --warning: #ffa502;
            --armor: #00d2d3;
            --dark: #2f3542;
        }

        body {
            margin: 0; background: #1e272e; font-family: 'Segoe UI', sans-serif;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; color: white; overflow: hidden;
        }

        #game-container {
            width: 850px; background: #34495e; border: 5px solid #ecf0f1;
            padding: 30px; border-radius: 20px; box-shadow: 0 25px 60px rgba(0,0,0,0.6);
        }

        .battle-header { display: flex; justify-content: space-between; margin-bottom: 25px; }
        .entity { width: 45%; }
        .bar-bg { height: 22px; background: #2c3e50; border: 2px solid #fff; border-radius: 6px; margin-bottom: 6px; overflow: hidden; }
        .bar-fill { height: 100%; width: 100%; transition: width 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        
        #hp-hero { background: var(--success); }
        #ap-hero { background: var(--armor); }
        #hp-boss { background: var(--primary); }

        #log {
            background: #000; padding: 15px; height: 50px; border-radius: 8px;
            margin-bottom: 25px; color: var(--success); font-family: 'Courier New', monospace;
            display: flex; align-items: center; border-left: 5px solid var(--success);
            font-size: 0.95rem; line-height: 1.2;
        }

        #action-panel {
            background: var(--dark); padding: 30px; border-radius: 15px; min-height: 280px;
            display: flex; flex-direction: column; justify-content: center;
        }

        .menu-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; }
        .btn-action {
            padding: 25px 15px; border: none; border-radius: 12px; color: white;
            font-weight: bold; cursor: pointer; transition: 0.3s; text-align: center;
            box-shadow: 0 4px 0 rgba(0,0,0,0.2);
        }
        .btn-action:hover { transform: translateY(-5px); filter: brightness(1.1); box-shadow: 0 8px 0 rgba(0,0,0,0.2); }
        .btn-attack { background: var(--primary); }
        .btn-shield { background: var(--secondary); }
        .btn-heal { background: var(--success); }

        .question-text { font-size: 1.5rem; margin-bottom: 25px; text-align: center; color: var(--warning); }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .opt-btn {
            padding: 18px; border: 2px solid #fff; background: rgba(255,255,255,0.05);
            color: white; border-radius: 10px; cursor: pointer; transition: 0.2s; font-size: 1rem;
        }
        .opt-btn:hover { background: rgba(255,255,255,0.2); transform: scale(1.02); }
        
        input[type="text"] {
            width: 100%; padding: 18px; box-sizing: border-box; border-radius: 10px;
            border: none; font-size: 1.3rem; text-align: center; outline: none;
        }

        .wish-card { background: white; color: #2c3e50; padding: 25px; border-radius: 12px; margin: 20px 0; border-left: 10px solid var(--warning); font-size: 1.2rem; }
        .shake { animation: shake 0.4s; }
        @keyframes shake { 0%, 100% { transform: translate(0); } 25% { transform: translate(-10px); } 75% { transform: translate(10px); } }
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="game-container">
    <div class="battle-header">
        <div class="entity">
            <div style="font-weight: bold; margin-bottom: 8px; display: flex; justify-content: space-between;">
                <span>HERO</span> <span id="hp-text">100/100</span>
            </div>
            <div class="bar-bg"><div id="hp-hero" class="bar-fill"></div></div>
            <div class="bar-bg" style="height: 12px;"><div id="ap-hero" class="bar-fill" style="width: 0%"></div></div>
            <div style="font-size: 0.85rem; color: var(--armor); font-weight: bold;">ARMOR: <span id="ap-text">0</span>/20</div>
        </div>
        <div class="entity" style="text-align: right;">
            <div style="font-weight: bold; margin-bottom: 8px; display: flex; justify-content: space-between;">
                 <span id="hp-boss-text">250/250</span> <span>BOSS</span>
            </div>
            <div class="bar-bg"><div id="hp-boss" class="bar-fill"></div></div>
            <div style="color: var(--warning); font-weight: bold; font-size: 1.1rem;">SCORE: <span id="score">0</span></div>
        </div>
    </div>

    <div id="log">> Are you ready? Choose an ability to start the battle!</div>

    <div id="action-panel">
        <div id="menu-main" class="menu-grid">
            <button class="btn-action btn-attack" onclick="startQuiz('attack')">🔥 ATTACK<br><small>Deal Damage</small></button>
            <button class="btn-action btn-shield" onclick="startQuiz('shield')">🛡️ SHIELD<br><small>Restore 20 Armor</small></button>
            <button class="btn-action btn-heal" onclick="startQuiz('heal')">💊 HEAL<br><small>Restore 20 Health</small></button>
        </div>

        <div id="quiz-zone" class="hidden">
            <div class="question-text" id="q-text"></div>
            <div id="ans-options" class="options-grid"></div>
            <div id="ans-input-wrapper" class="hidden">
                <input type="text" id="ans-input" placeholder="Type answer and press Enter.">
            </div>
        </div>

        <div id="final-screen" class="hidden" style="text-align: center;">
            <h1 id="final-title" style="font-size: 3rem; margin: 0;"></h1>
            <div id="wish-container" class="wish-card hidden">
                <p id="wish-text"></p>
            </div>
            <p style="font-size: 1.2rem;">Total Score Achieved: <span id="final-score" style="color: var(--warning); font-size: 2rem; font-weight: bold;">0</span></p>
            <button class="btn-action btn-shield" style="width: 250px" onclick="location.reload()">PLAY AGAIN</button>
        </div>
    </div>
</div>

<script>
const ORIGINAL_QUESTIONS = {
    attack: [
        // Vocabulary & Multiple Choice
        { q: "What does 'background' mean?", opts: ["personal history", "free time", "money", "clothes"], a: "personal history" },
        { q: "What does 'apply for' mean?", opts: ["ask for something officially", "look after someone", "give up something", "write notes"], a: "ask for something officially" },
        { q: "What does 'sign up for' mean?", opts: ["cancel something", "register for something", "forget something", "borrow something"], a: "register for something" },
        { q: "What does 'enroll in' mean?", opts: ["leave a class", "join a course officially", "fail a subject", "change a school"], a: "join a course officially" },
        { q: "What does 'put something off' mean?", opts: ["postpone it", "enjoy it", "complete it", "explain it"], a: "postpone it" },
        { q: "An 'ambitious' person is someone who _____.", opts: ["has no plans", "has big goals", "is very lazy", "is always angry"], a: "has big goals" },
        { q: "“Achievable” means _____.", opts: ["impossible to finish", "easy to forget", "possible to do", "hard to understand"], a: "possible to do" },
        { q: "A “breadwinner” is the person who _____.", opts: ["earns most of the money", "cooks every day", "studies abroad", "cleans the house"], a: "earns most of the money in the family" },
        // Past Tense Contexts
        { q: "When Uchimura _____ the stadium, the gymnastics event _____.", opts: ["enters / begins", "entered / began", "entering / begun", "entered / had begun"], a: "entered / began" },
        { q: "Before Uchimura _____ in 2012, he _____ world championships.", opts: ["competed / wins", "competed / had won", "competed / won", "had competed / won"], a: "competed / had won" },
        { q: "They _____ (already/make) a decision when we called.", opts: ["already made", "have already made", "had already made", "were already making"], a: "had already made" }
    ],
    shield: [
        // Yes/No & Correct/Incorrect
        { q: "“Switch to” means “change to another thing.”", opts: ["True", "False"], a: "True" },
        { q: "A caregiver is a person who takes care of others.", opts: ["True", "False"], a: "True" },
        { q: "“Realistic” means impossible in real life.", opts: ["True", "False"], a: "False" },
        { q: "“Qualification” means the skills or education needed for a job.", opts: ["True", "False"], a: "True" },
        { q: "“Put something off” means to finish it quickly.", opts: ["True", "False"], a: "False" },
        { q: "A breadwinner is the person who earns most of the family income.", opts: ["True", "False"], a: "True" },
        { q: "“Sign up for” means “to register for something.”", opts: ["True", "False"], a: "True" },
        { q: "Is this correct: 'I’ve been knowing him for ten years.'?", opts: ["True", "False"], a: "False" },
        { q: "Is this correct: 'She has been understanding the lesson perfectly lately.'?", opts: ["True", "False"], a: "False" },
        { q: "Is this correct: 'She applied for the position last week.'?", opts: ["True", "False"], a: "True" }
    ],
    heal: [
        // Fill in the blanks (Input typing)
        { q: "I want to ______ for a part-time job next summer.", a: "apply" },
        { q: "She ______ up for an English course last week. (Past tense)", a: "signed" },
        { q: "He will ______ in a business program next semester.", a: "enroll" },
        { q: "Please do not put the plan ______ until next month.", a: "off" },
        { q: "This goal is ______ if we work hard every day. (a...)", a: "achievable" },
        { q: "My father is the main ______ in my family because he earns the money.", a: "breadwinner" },
        { q: "Lila Downs _____ while I _____ for my seat. (already/sing - look)", a: "was already singing / was looking" },
        { q: "She _____ (just/accept) into a top-notch business school.", a: "has just been accepted" },
        { q: "We _____ (fill) out a lot of applications recently.", a: "have been filling" },
        { q: "Right now she _____ (have) a meeting. (Stative verb context)", a: "is having" },
        { q: "He works hard to _____ (fulfill) his goals.", a: "fulfill" },
        { q: "I _____ (think) these laws are unfair. (Opinion/Stative)", a: "think" }
    ]
};

    let currentQuestions = JSON.parse(JSON.stringify(ORIGINAL_QUESTIONS));

    const wishes = [
        "🌟 Have a good day!",
        "🚀 I wish you could score 10 on the FE!",
        "💎 Hello there Vu. Finally you can find Vu!",
        "🏆 I wish you could have a date with your crush.!",
        '🏆 Đàm Vĩnh Hưng said "You are all grown up. Learn to become successful."'
    ];

    let heroHP = 100, heroAP = 0, TrueBossHp = 250, bossHP = 250, score = 0, currentType = '';
    const MAX_AP = 20;

    function updateLog(msg, color = 'var(--success)') {
        const log = document.getElementById('log');
        log.innerText = `> ${msg}`;
        log.style.color = color;
    }

    function startQuiz(type) {
        currentType = type;
        if (currentQuestions[type].length === 0) {
            updateLog(`${type.toUpperCase()} pool empty. Refreshing...`, 'var(--warning)');
            currentQuestions[type] = JSON.parse(JSON.stringify(ORIGINAL_QUESTIONS[type]));
        }

        const randomIndex = Math.floor(Math.random() * currentQuestions[type].length);
        const qData = currentQuestions[type].splice(randomIndex, 1)[0];

        document.getElementById('menu-main').classList.add('hidden');
        document.getElementById('quiz-zone').classList.remove('hidden');
        document.getElementById('q-text').innerText = qData.q;

        const optZone = document.getElementById('ans-options');
        const inputWrapper = document.getElementById('ans-input-wrapper');
        optZone.innerHTML = '';
        inputWrapper.classList.add('hidden');

        if(type === 'heal') {
            inputWrapper.classList.remove('hidden');
            const inp = document.getElementById('ans-input');
            inp.value = ''; inp.focus();
            inp.onkeypress = (e) => { if(e.key === 'Enter') checkAns(inp.value, qData.a); };
        } else {
            qData.opts.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'opt-btn';
                btn.innerText = opt;
                btn.onclick = () => checkAns(opt, qData.a);
                optZone.appendChild(btn);
            });
        }
    }

    function checkAns(userInp, correctInp) {
        const isRight = userInp.toLowerCase().trim() === correctInp.toLowerCase();
        document.getElementById('quiz-zone').classList.add('hidden');
        document.getElementById('menu-main').classList.remove('hidden');

        if(isRight) {
            if(currentType === 'attack') {
                bossHP = Math.max(0, bossHP - 25); score += 100;
                updateLog("CORRECT! Boss took damage. (-25 Boss HP)");
            } else if(currentType === 'shield') {
                heroAP = MAX_AP; score += 50;
                updateLog("SHIELD ACTIVATED! You gained 20 AP.");
            } else {
                heroHP = Math.min(100, heroHP + 20); score += 80;
                updateLog("HEAL SUCCESSFUL! Recovered 20 HP.");
            }
        } else {
            let damage = 25;
            document.getElementById('game-container').classList.add('shake');
            setTimeout(() => document.getElementById('game-container').classList.remove('shake'), 400);

            let msg = `WRONG! Correct answer was: "${correctInp}". `;

            if(heroAP > 0) {
                if(heroAP >= damage) {
                    heroAP -= damage;
                    updateLog(`${msg}Shield absorbed damage.`, 'var(--warning)');
                } else {
                    let remain = damage - heroAP;
                    heroAP = 0; heroHP -= remain;
                    updateLog(`${msg}Shield broke, took ${remain} damage.`, 'var(--primary)');
                }
            } else {
                heroHP -= damage;
                updateLog(`${msg}You took ${damage} direct damage.`, 'var(--primary)');
            }
        }
        refreshUI();
    }

    function refreshUI() {
        document.getElementById('hp-hero').style.width = heroHP + '%';
        document.getElementById('ap-hero').style.width = (heroAP / MAX_AP * 100) + '%';
        document.getElementById('hp-boss').style.width = (bossHP/TrueBossHp)*100 + '%';
        document.getElementById('hp-text').innerText = `${heroHP}/100`;
        document.getElementById('ap-text').innerText = heroAP;
        document.getElementById('hp-boss-text').innerText = `${bossHP}/${TrueBossHp}`;
        document.getElementById('score').innerText = score;

        if(bossHP <= 0) endGame(true);
        else if(heroHP <= 0) endGame(false);
    }

    function endGame(isWin) {
        document.getElementById('menu-main').classList.add('hidden');
        document.getElementById('log').classList.add('hidden');
        document.getElementById('final-screen').classList.remove('hidden');
        document.getElementById('final-score').innerText = score;

        const title = document.getElementById('final-title');
        if(isWin) {
            title.innerText = "VICTORY!";
            title.style.color = "var(--success)";
            document.getElementById('wish-container').classList.remove('hidden');
            document.getElementById('wish-text').innerText = wishes[Math.floor(Math.random() * wishes.length)];
        } else {
            title.innerText = "GAME OVER";
            title.style.color = "var(--primary)";
        }
    }
</script>
</body>
</html>
